syntax = "proto3";

package relay.presence.v1;

option go_package = "github.com/drim-dev/verifying-agent-code/go/src/relay/presence/presencepb";

// Presence is the thin internal presence service (spec/04-dependencies.md §8): one unary
// RPC and one server-streaming RPC, the same proto across all five languages.
service Presence {
  rpc GetPresence(GetPresenceRequest) returns (PresenceStatus);                 // unary
  rpc StreamChannelPresence(StreamChannelPresenceRequest)
      returns (stream PresenceStatus);                                          // server-streaming
}

message GetPresenceRequest { string user_id = 1; }
message StreamChannelPresenceRequest { repeated string user_ids = 1; }
message PresenceStatus {
  string user_id = 1;
  bool online = 2;
}
