# JPA never owns the schema — Flyway does (V1__init.sql mirrors spec/03-schema.md).
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true

# Broker event wire JSON serializes timestamps as RFC-3339 strings (the cross-language contract —
# Go's json.Marshal of time.Time), matching infra/EventCodecs.canonicalMapper used by the harnesses.
spring.jackson.serialization.write-dates-as-timestamps=false

# The 1 MiB attachment cap is a business rule enforced IN AttachmentsController (pinned 413
# attachment:too_large), not by the servlet multipart parser — mirrors the Go handler reading one
# byte past the limit. Set the framework cap above 1 MiB so an over-limit upload reaches the handler
# and gets the pinned code, instead of the parser throwing MaxUploadSizeExceeded (an opaque 500).
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

# Connection details are supplied per-environment (the test harness wires Testcontainers).
