# Alembic config for Relay (Python). The DSN is injected at runtime by the
# harness (it points at the testcontainers Postgres), so sqlalchemy.url here is
# only a non-functional placeholder; env.py reads RELAY_DATABASE_URL.
[alembic]
script_location = src/relay/store/migrations
prepend_sys_path = src
sqlalchemy.url = postgresql+psycopg://placeholder

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
